name: CD — Function App AzureTech

on:
  push:
    branches: [main]

env:
  RESOURCE_GROUP: "rg-nathan-tesseyre-prf2026"
  FUNCTION_APP_NAME: "api-func-nathan"
  STORAGE_ACC_NAME: "sanathantesseyre"

permissions:
  id-token: write
  contents: read

jobs:

  create:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az storage account create -g $RESOURCE_GROUP -n $STORAGE_ACC_NAME 
      - run: az functionapp create -g $RESOURCE_GROUP -n $FUNCTION_APP_NAME -p "${{ secrets.SHARED_PLAN }}" -s "$STORAGE_ACC_NAME" --runtime "PYTHON" --runtime-version "3.11"

  delete:
    runs-on: ubuntu-latest
    needs: create
    if: ${{ always() }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az functionapp delete -g $RESOURCE_GROUP -n $FUNCTION_APP_NAME
      - run: az storage account delete -g $RESOURCE_GROUP -n $STORAGE_ACC_NAME --yes
