name: CD — Container App AzureTech

on:
  push:
    branches: [main]

env:
  RESOURCE_GROUP: "rg-nathan-tesseyre-prf2026"
  CONTAINER_APP_NAME: "api-aci-nathan"

permissions:
  id-token: write
  contents: read

jobs:

  create:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az container create -g $RESOURCE_GROUP -n $CONTAINER_APP_NAME --cpu 1 --memory 1.5 --os-type Linux --image mcr.microsoft.com/azuredocs/aci-helloworld

  delete:
    runs-on: ubuntu-latest
    needs: create
    if: ${{ always() }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az container delete -g $RESOURCE_GROUP -n $CONTAINER_APP_NAME
