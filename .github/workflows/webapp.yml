name: CD — Function App AzureTech

on:
  push:
    branches: [main]

env:
  APP_NAME: api-appservice-nathan
  RESOURCE_GROUP: rg-nathan-tesseyre-prf2026

permissions:
  id-token: write
  contents: read

jobs:

  create:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az webapp create -g "$RESOURCE_GROUP" -n "$APP_NAME" --plan "${{ secrets.SHARED_PLAN }}" --runtime "PHP:8.2"

  delete:
    runs-on: ubuntu-latest
    needs: create
    if: ${{ always() }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az webapp delete -g $RESOURCE_GROUP -n $APP_NAME
