name: CD — AzureTech

on:
  push:
    branches: [main]

env:
  APP_NAME: api-appservice-nathan
  RESOURCE_GROUP: rg-nathan-tesseyre-prf2026

permissions:
  id-token: write
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az webapp create -g "$RESOURCE_GROUP" -n "$APP_NAME" --plan "${{ secrets.SHARED_PLAN }}" --runtime "PHP:8.2"
  deploy:
    runs-on: ubuntu-latest
    needs: create
    steps:
      - uses: actions/checkout@v7
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az webapp deploy -g $RESOURCE_GROUP -n $APP_NAME --src-path ./index.php --type static --target-path /home/site/wwwroot/index.php
  delete:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az webapp delete -g $RESOURCE_GROUP -n $APP_NAME
